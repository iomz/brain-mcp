---
services:
  brain-mcp:
    build:
      context: .
    restart: unless-stopped
    environment:
      BRAIN_ROOT: /brain
      BRAIN_MCP_ADDR: 0.0.0.0:8787
      BRAIN_MCP_AUTH_MODE: ${BRAIN_MCP_AUTH_MODE:-mixed}
      BRAIN_MCP_TOKEN: ${BRAIN_MCP_TOKEN}
      BRAIN_MCP_OAUTH_RESOURCE: ${BRAIN_MCP_OAUTH_RESOURCE:-https://brain.sazanka.io/mcp}
      BRAIN_MCP_OAUTH_ISSUER: ${BRAIN_MCP_OAUTH_ISSUER:-https://auth.sazanka.io/application/o/brain-mcp/}
      BRAIN_MCP_OAUTH_JWKS_URL: ${BRAIN_MCP_OAUTH_JWKS_URL:-https://auth.sazanka.io/application/o/brain-mcp/jwks/}
      BRAIN_MCP_OAUTH_CLIENT_ID: ${BRAIN_MCP_OAUTH_CLIENT_ID:-}
      BRAIN_MCP_OAUTH_ACCEPTED_AUDIENCES: ${BRAIN_MCP_OAUTH_ACCEPTED_AUDIENCES:-https://brain.sazanka.io/mcp}
      BRAIN_MCP_OAUTH_AUTHORIZATION_SERVER: ${BRAIN_MCP_OAUTH_AUTHORIZATION_SERVER:-https://auth.sazanka.io/application/o/brain-mcp/}
      BRAIN_MCP_OAUTH_AUTHORIZATION_SERVERS: ${BRAIN_MCP_OAUTH_AUTHORIZATION_SERVERS:-https://auth.sazanka.io/application/o/brain-mcp/}
      BRAIN_MCP_OAUTH_DCR_ENABLED: ${BRAIN_MCP_OAUTH_DCR_ENABLED:-false}
      BRAIN_MCP_OAUTH_AUTHORIZATION_SERVER_ISSUER: ${BRAIN_MCP_OAUTH_AUTHORIZATION_SERVER_ISSUER:-https://brain.sazanka.io}
      BRAIN_MCP_OAUTH_APPROVAL_TOKEN: ${BRAIN_MCP_OAUTH_APPROVAL_TOKEN:-}
      BRAIN_MCP_OAUTH_SUBJECT: ${BRAIN_MCP_OAUTH_SUBJECT:-brain-mcp-user}
      BRAIN_MCP_OAUTH_EMAIL: ${BRAIN_MCP_OAUTH_EMAIL:-}
      BRAIN_MCP_OAUTH_STATE_FILE: ${BRAIN_MCP_OAUTH_STATE_FILE:-/state/oauth-state.json}
      BRAIN_MCP_OAUTH_AUTHENTIK_APPROVAL_ENABLED: ${BRAIN_MCP_OAUTH_AUTHENTIK_APPROVAL_ENABLED:-false}
      BRAIN_MCP_OAUTH_AUTHENTIK_CLIENT_ID: ${BRAIN_MCP_OAUTH_AUTHENTIK_CLIENT_ID:-${BRAIN_MCP_OAUTH_CLIENT_ID:-}}
      BRAIN_MCP_OAUTH_AUTHENTIK_CLIENT_SECRET: ${BRAIN_MCP_OAUTH_AUTHENTIK_CLIENT_SECRET:-}
      BRAIN_MCP_OAUTH_AUTHENTIK_AUTHORIZE_URL: ${BRAIN_MCP_OAUTH_AUTHENTIK_AUTHORIZE_URL:-}
      BRAIN_MCP_OAUTH_AUTHENTIK_TOKEN_URL: ${BRAIN_MCP_OAUTH_AUTHENTIK_TOKEN_URL:-}
      BRAIN_MCP_OAUTH_AUTHENTIK_REDIRECT_URI: ${BRAIN_MCP_OAUTH_AUTHENTIK_REDIRECT_URI:-}
      BRAIN_MCP_OAUTH_SCOPES: ${BRAIN_MCP_OAUTH_SCOPES:-openid,email,profile}
      BRAIN_MCP_OAUTH_DEFAULT_SCOPES: ${BRAIN_MCP_OAUTH_DEFAULT_SCOPES:-brain:read}
      BRAIN_MCP_BEARER_SCOPES: ${BRAIN_MCP_BEARER_SCOPES:-brain:read,brain:write,brain:git,brain:admin}
      BRAIN_MCP_ALLOWED_SUBJECTS: ${BRAIN_MCP_ALLOWED_SUBJECTS:-}
      BRAIN_MCP_ALLOWED_EMAILS: ${BRAIN_MCP_ALLOWED_EMAILS:-}
      BRAIN_MCP_ALLOWED_GROUPS: ${BRAIN_MCP_ALLOWED_GROUPS:-}
      BRAIN_MCP_AUTH_DEBUG: ${BRAIN_MCP_AUTH_DEBUG:-false}
      BRAIN_MCP_WRITABLE_PATHS: ${BRAIN_MCP_WRITABLE_PATHS:-Knowledge/,System/,Active/,Archive/}
      BRAIN_MCP_READONLY_PATHS: ${BRAIN_MCP_READONLY_PATHS:-Journal/}
      BRAIN_MCP_REQUIRE_GIT: ${BRAIN_MCP_REQUIRE_GIT:-true}
    volumes:
      - ${BRAIN_ROOT_HOST:-${BRAIN_ROOT:-/tmp/brain-mcp-missing-brain-root}}:/brain
      - brain-mcp-oauth-state:/state

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - brain-mcp
    command:
      - tunnel
      - run
      - --token
      - ${CLOUDFLARED_TUNNEL_TOKEN}

volumes:
  brain-mcp-oauth-state:
